apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msa-front
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CoinWing/Infrastructure
    path: code/argocd/kustomize/msa-front
    targetRevision: prod
  destination:
    server: https://kubernetes.default.svc
    namespace: cowing-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true