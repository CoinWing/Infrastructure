apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msa-auth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CoinWing/Cowing-msa-auth
    path: code/argocd/kustomize/msa-auth
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cowing-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

