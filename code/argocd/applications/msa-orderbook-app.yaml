apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msa-orderbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CoinWing/Infrastructure.git
    path: code/argocd/kustomize/msa-orderbook
    targetRevision: prod
  destination:
    server: https://kubernetes.default.svc
    namespace: cowing-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true