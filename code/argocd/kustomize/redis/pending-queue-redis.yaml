apiVersion: apps/v1
kind: Deployment
metadata:
  name: pending-queue-redis
  namespace: cowing-prod
  labels:
    app: pending-queue-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pending-queue-redis
  template:
    metadata:
      labels:
        app: pending-queue-redis
    spec:
      containers:
        - name: pending-queue-redis
          image: redis:alpine
          env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: redis-password
          command: ["redis-server", "--port", "6381", "--appendonly", "yes", "--appendfilename", "appendonly.aof", "--save", "60 500"]
          args: ["--requirepass", "$(REDIS_PASSWORD)"]
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 200Mi
          ports:
            - containerPort: 6381