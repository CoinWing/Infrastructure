apiVersion: apps/v1
kind: Deployment
metadata:
  name: msa-trade
  namespace: cowing-prod
  labels:
    app: msa-trade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msa-trade
  template:
    metadata:
      labels:
        app: msa-trade
    spec:
      containers:
      - name: msa-trade
        image: ghcr.io/coinwing/cowing-msa-trading
        imagePullPolicy: Always
        env:
        - name: REDIS_HOST
          value: "orderbook-redis"
        - name: REDIS_PORT
          value: "6380"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-password
        - name: DB_URL
          value: "jdbc:mariadb://common-mariadb:3306/cowingDB"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: jwt-secret
        - name: QUEUE_NAME
          valueFrom:
            secretKeyRef:
              name: trade-config
              key: queue-name
        - name: PD_REDIS_HOST
          value: "pending-queue-redis"
        - name: PD_REDIS_PORT
          value: "6381"
        - name: PD_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trade-config
              key: pd-redis-password
        - name: ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: trade-config
              key: access-key
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trade-config
              key: secret-key
        - name: REGION
          value: "ap-northeast-2"
        - name: SQS_URI
          valueFrom:
            secretKeyRef:
              name: trade-config
              key: sqs-uri
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 600Mi
        ports:
        - containerPort: 8082
      imagePullSecrets:
      - name: ghcr-login-secret