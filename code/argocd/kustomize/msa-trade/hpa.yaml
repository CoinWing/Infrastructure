apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: msa-trade
  namespace: cowing-prod
  labels:
    app: msa-trade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: msa-trade
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

