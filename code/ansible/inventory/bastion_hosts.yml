---
all:
  children:
    bastion:
      hosts:
        bastion_host:
          ansible_host: "{{ lookup('aws_ec2', 'tag:Name=cowing-prod-bastion-host', 'instance-state-name=running', region='ap-northeast-2') | map(attribute='public_ip_address') | first }}"
          ansible_user: ec2-user
          ansible_ssh_private_key_file: "{{ playbook_dir }}/../terraform/utils/bastion_key"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
          ansible_connection: ssh
          ansible_python_interpreter: /usr/bin/python3
          
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
