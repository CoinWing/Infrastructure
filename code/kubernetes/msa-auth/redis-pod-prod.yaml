apiVersion: v1
kind: Pod
metadata:
  name: msa-auth-redis
  namespace: cowing-prod
  labels:
    app: msa-auth-redis
spec:
  containers:
    - name: msa-auth-redis
      image: redis:alpine
      command: ["sh", "-c"]
      args:
        - redis-server --appendonly no --save ''
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          cpu: 200m
          memory: 200Mi
      ports:
        - containerPort: 6380