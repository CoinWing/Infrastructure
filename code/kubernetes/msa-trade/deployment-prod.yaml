apiVersion: apps/v1
kind: Deployment
metadata:
  name: msa-trade
  namespace: cowing-prod
  labels:
    app: msa-trade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msa-trade
  template:
    metadata:
      labels:
        app: msa-trade
        cowing: trade
    spec:
      containers:
      - name: msa-trade
        image: ghcr.io/coinwing/cowing-msa-trading
        env:
        - name: REDIS_HOST
          value: "msa-trade-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-password
        - name: DB_URL
          value: "jdbc:mariadb://common-mariadb:3306/cowingdb"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mardiadb-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mardiadb-secret
              key: password
        - name: JWT_SECRET
          value: "99f461065038a0d63d66ad26d52bf68a76ad3b0d7cb576f2b67cd8d9e75230e9"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 600Mi
        ports:
        - containerPort: 8080
      imagePullSecrets:
      - name: ghcr-login-secret