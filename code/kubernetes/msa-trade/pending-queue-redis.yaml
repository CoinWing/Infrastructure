apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pending-queue-redis
  namespace: cowing-prod
  labels:
    app: pending-queue-redis
spec:
  serviceName: pending-queue-redis
  replicas: 1
  selector:
    matchLabels:
      app: pending-queue-redis
  template:
    metadata:
      labels:
        app: pending-queue-redis
    spec:
      containers:
        - name: pending-queue-redis
          image: redis:alpine
          env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: redis-password
          command: ["redis-server"]
          args: 
            - "--port"
            - "6381"
            - "--appendonly"
            - "yes"
            - "--appendfilename"
            - "appendonly.aof"
            - "--save"
            - "60 500"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 200Mi
          ports:
            - containerPort: 6381
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi