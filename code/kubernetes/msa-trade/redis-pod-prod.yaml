apiVersion: v1
kind: Pod
metadata:
  name: redis-pod
  labels:
    app: redis 
spec:
  containers:
  - name: redis
    image: redis:alpine
    env:
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: redis-secret     
          key: redis-password   
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    args: ["--requirepass", "$(REDIS_PASSWORD)"]
    resources:
      limits:
        memory: 200Mi
        cpu: 200m
      requests:
        memory: 100Mi
        cpu: 100m
    ports:
      - containerPort: 6379