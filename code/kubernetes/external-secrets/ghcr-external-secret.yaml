apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-external-secret
  namespace: cowing-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ghcr-login-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .server }}": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "email": "{{ .email }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
  - secretKey: server
    remoteRef:
      key: cowing-prod-github-registry
      property: server
  - secretKey: username
    remoteRef:
      key: cowing-prod-github-registry
      property: username
  - secretKey: password
    remoteRef:
      key: cowing-prod-github-registry
      property: password
  - secretKey: email
    remoteRef:
      key: cowing-prod-github-registry
      property: email