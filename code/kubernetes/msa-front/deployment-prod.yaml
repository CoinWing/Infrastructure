apiVersion: apps/v1
kind: Deployment
metadata:
  name: msa-front
  namespace: cowing-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: msa-front
  template:
    metadata:
      labels:
        app: msa-front
    spec:
      containers:
      - name: msa-front
        image: ghcr.io/coinwing/cowing-msa-front
        ports:
        - containerPort: 3000
        env:
        - name: UPBIT_WS_URL
          value: "ws://msa-broadcaster:8081/ws"
        - name: UPBIT_API_URL
          value: "https://api.upbit.com/v1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
      imagePullSecrets:
        - name: ghcr-login-secret